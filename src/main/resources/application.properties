spring.application.name=jira-manager
# ── Google OAuth2 (temporarily disabled) ──────────────────────────────
# To re-enable: uncomment the 3 properties below and remove the exclude line
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
#spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
#spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
#spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ── Database (H2 in-memory for dev, swap to PostgreSQL for prod) ────────
spring.datasource.url=jdbc:h2:file:./data/jiramanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.port 8888
# Jira credentials are now stored per-user in the database (Settings page).
# See JiraConfig entity and SettingsView.

# ── Vaadin ─────────────────────────────────────────────────────────────
vaadin.launch-browser=true
vaadin.whitelisted-packages=com.vaadin,org.vaadin,dev.hilla,com.jiramanager

# ── Logging ────────────────────────────────────────────────────────────
logging.level.com.jiramanager=DEBUG
